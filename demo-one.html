<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sorting Hat · Three Controls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite"></main>
    <script type="module">
      import("./src/app.js").catch((error) => {
        const app = document.querySelector("#app");
        if (app) {
          app.innerHTML = `<pre style="white-space:pre-wrap;color:#f1ece7;background:#171415;padding:24px;">${error.stack || error.message}</pre>`;
        }
        console.error(error);
      });
    </script>
  </body>
</html>
